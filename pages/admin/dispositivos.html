content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="../../assets/css/layout.css">

<body>

<div class="layout">

<aside class="sidebar">

<div class="logo">

SAFE WOMAN

<nav class="menu">

<div class="main">

<div class="user-box">

<span>

</span>

id="logout"
class="logout">

Sair

</button>

</div>

</header>

<div class="content">

<h1>Dispositivos</h1>

<div class="grid">

<div class="card">

<h2>Novo Dispositivo</h2>

<input
id="serial"
type="text"
placeholder="Serial (SW-000001)">

<input
id="modelo"
type="text"
placeholder="Modelo">

<input
id="imei"
type="text"
placeholder="IMEI">

<input
id="chip"
type="text"
placeholder="Número do Chip">

<button id="salvar">

Salvar Dispositivo

</button>

<p id="msg"></p>

</div>

<div class="card">

<h2>Dispositivos Cadastrados</h2>

<div id="lista">

Carregando...

</div>

</div>

</div>

</div>
